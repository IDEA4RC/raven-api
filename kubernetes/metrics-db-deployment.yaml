apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-postgres
  namespace: raven-api
  labels:
    app: metrics-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-postgres
  template:
    metadata:
      labels:
        app: metrics-postgres
    spec:
      containers:
      - name: metrics-postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "metrics_db"
        - name: POSTGRES_USER
          value: "metrics_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: raven-api-secrets
              key: metrics-db-password
        volumeMounts:
        - name: metrics-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "metrics_user", "-d", "metrics_db"]
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "metrics_user", "-d", "metrics_db"]
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: metrics-storage
        persistentVolumeClaim:
          claimName: metrics-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-postgres-service
  namespace: raven-api
  labels:
    app: metrics-postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: metrics-postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metrics-postgres-pvc
  namespace: raven-api
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
